add_newline = false
command_timeout = 200
format = "[$hostname$directory$git_branch$git_status$character]($style)"

[character]
error_symbol = "[!>](bold cyan)"
success_symbol = "[>](bold cyan)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
format = '[$path]($style)[$read_only]($read_only_style)'
#repo_root_style = "bold cyan"
#repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)"
fish_style_pwd_dir_length = 2

[git_branch]
format = '[ \($branch]($style)'
style = "blue"

[git_status]
format     = '[$all_status\)]($style)'
style      = "blue"
ahead      = "⇡${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
behind     = "⇣${count}"
conflicted = ""
up_to_date = ""
untracked  = "?"
modified   = ""
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[hostname]
format     = '[@$hostname]($style) '
